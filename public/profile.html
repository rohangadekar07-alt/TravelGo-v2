<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | TravelGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3a86ff;
            --primary-dark: #2563eb;
            --dark: #0f172a;
            --slate: #64748b;
            --light: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            color: var(--dark);
        }

        nav {
            background: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark);
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-header {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .avatar-huge {
            width: 100px;
            height: 100px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
        }

        .user-info h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .user-info p {
            color: var(--slate);
            font-size: 1rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .detail-item {
            margin-bottom: 20px;
        }

        .detail-item label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-item span {
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-edit {
            color: var(--primary);
            background: rgba(58, 134, 255, 0.1);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab {
            padding: 10px 0;
            font-weight: 600;
            color: var(--slate);
            cursor: pointer;
            position: relative;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }

        /* History Tables */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-item {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-main h4 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .item-meta {
            font-size: 0.85rem;
            color: var(--slate);
            display: flex;
            gap: 15px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-success { background: #dcfce7; color: #166534; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-blue { background: #dbeafe; color: #1e40af; }

        .btn-logout {
            background: #fee2e2;
            color: #b91c1c;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-back-home {
            background: white;
            color: var(--dark);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1.5px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-back-home:hover {
            background: #f8fafc;
            transform: translateX(-3px);
            border-color: var(--primary);
            color: var(--primary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
            nav { padding: 10px 4%; }
            .btn-back-home span { display: none; } /* Hide text on mobile, icons only */
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="/" class="btn-back-home">
                <i class="fas fa-arrow-left"></i> <span>Back to Home</span>
            </a>
            <a href="/" class="logo">Travel<span>GO</span></a>
        </div>
        <div class="nav-right">
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-header">
            <div class="avatar-huge" id="avatarChar">?</div>
            <div class="user-info">
                <h1 id="headerName">Loading...</h1>
                <p id="headerEmail">...</p>
            </div>
        </div>

        <div class="grid-layout">
            <aside>
                <div class="card">
                    <div class="card-title">
                        Personal Details
                        <button class="btn-edit" onclick="alert('Update Profile logic can be added here!')">Edit</button>
                    </div>
                    
                    <div class="detail-item">
                        <label>Full Name</label>
                        <span id="detName">--</span>
                    </div>
                    <div class="detail-item">
                        <label>Mobile Number</label>
                        <span id="detMobile">--</span>
                    </div>
                    <div class="detail-item">
                        <label>Address</label>
                        <span id="detAddress">--</span>
                    </div>
                    <div class="detail-item">
                        <label>Location Status</label>
                        <span id="detLocation">Not Shared</span>
                    </div>
                </div>
            </aside>

            <main>
                <div class="card">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('bookings')">My Bookings</div>
                        <div class="tab" onclick="switchTab('inquiries')">My Inquiries</div>
                    </div>

                    <div id="bookingsSection" class="history-list">
                        <!-- Bookings go here -->
                        <p style="color: var(--slate); text-align: center; padding: 20px;">Fetching your bookings...</p>
                    </div>

                    <div id="inquiriesSection" class="history-list" style="display: none;">
                        <!-- Inquiries go here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }

        async function loadProfile() {
            try {
                // Load Bio
                const profileRes = await fetch('/api/user/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const profileData = await profileRes.json();

                if (profileData.success) {
                    const u = profileData.user;
                    document.getElementById('headerName').textContent = u.fullName;
                    document.getElementById('headerEmail').textContent = u.email;
                    document.getElementById('detName').textContent = u.fullName;
                    document.getElementById('detMobile').textContent = u.mobileNumber;
                    document.getElementById('detAddress').textContent = u.address;
                    document.getElementById('avatarChar').textContent = u.fullName.charAt(0).toUpperCase();
                    
                    if (u.liveLocation && u.liveLocation.latitude) {
                        document.getElementById('detLocation').textContent = 'Live Location Shared ✅';
                        document.getElementById('detLocation').style.color = '#15803d';
                    }
                }

                // Load History
                const historyRes = await fetch('/api/user/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const historyData = await historyRes.json();

                if (historyData.success) {
                    renderHistory(historyData.bookings, historyData.inquiries);
                }

            } catch (err) {
                console.error(err);
            }
        }

        function renderHistory(bookings, inquiries) {
            const bCont = document.getElementById('bookingsSection');
            const iCont = document.getElementById('inquiriesSection');

            if (bookings.length === 0) {
                bCont.innerHTML = '<p style="text-align:center; color:gray;">No bookings found yet.</p>';
            } else {
                bCont.innerHTML = bookings.map(b => `
                    <div class="history-item">
                        <div class="item-main">
                            <h4>${b.travelSpot} Holiday</h4>
                            <div class="item-meta">
                                <span><i class="far fa-calendar-alt"></i> ${new Date(b.travelDate).toLocaleDateString()}</span>
                                <span><i class="fas fa-hashtag"></i> ${b.bookingId || 'N/A'}</span>
                                <span><i class="fas fa-rupee-sign"></i> ${b.price}</span>
                            </div>
                        </div>
                        <div class="item-status">
                            <span class="badge ${getStatusBadge(b.paymentStatus)}">${b.paymentStatus}</span>
                            ${(b.paymentStatus === 'Paid' || b.paymentStatus === 'Cash Confirmed') ? 
                                `<a href="/receipt.html?id=${b._id}" class="receipt-link" style="display:block; font-size: 0.75rem; color: var(--primary); text-decoration:none; margin-top:5px; font-weight:700;"><i class="fas fa-file-invoice"></i> Receipt</a>` : ''
                            }
                        </div>
                    </div>
                `).join('');
            }

            if (inquiries.length === 0) {
                iCont.innerHTML = '<p style="text-align:center; color:gray;">No inquiries found.</p>';
            } else {
                iCont.innerHTML = inquiries.map(i => `
                    <div class="history-item">
                        <div class="item-main">
                            <h4>Inquiry for ${i.travelSpot}</h4>
                            <div class="item-meta">
                                <span><i class="far fa-calendar-alt"></i> Travel Date: ${new Date(i.travelDate).toLocaleDateString()}</span>
                                <span><i class="far fa-clock"></i> Sent: ${new Date(i.submittedAt).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <div class="item-status">
                            <span class="badge badge-blue">Sent</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function getStatusBadge(status) {
            if (status === 'Paid' || status === 'Cash Confirmed') return 'badge-success';
            if (status === 'Cash Pending') return 'badge-pending';
            return 'badge-blue';
        }

        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (type === 'bookings') {
                document.getElementById('bookingsSection').style.display = 'flex';
                document.getElementById('inquiriesSection').style.display = 'none';
            } else {
                document.getElementById('bookingsSection').style.display = 'none';
                document.getElementById('inquiriesSection').style.display = 'flex';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadProfile();
    </script>
</body>
</html>
