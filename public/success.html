<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | TravelGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4757;
            --success: #2ed573;
            --dark: #2f3542;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: #f1f2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .success-card {
            background: white;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #e8fbf0;
            color: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
        }
        h1 {
            color: var(--dark);
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .subtitle {
            color: #747d8c;
            margin-bottom: 30px;
        }
        .summary-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 35px;
            text-align: left;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .summary-row:last-child { margin-bottom: 0; }
        .label { color: #888; }
        .value { font-weight: 600; color: #333; }
        .badge {
            background: #e8fbf0;
            color: var(--success);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .btn-home {
            background: var(--primary);
            color: white;
            padding: 16px 40px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.2);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-box"><i class="fas fa-check"></i></div>
        <h1>Payment Successful</h1>
        <p class="subtitle">Pack your bags! Your adventure is officially confirmed.</p>
        
        <div class="summary-box">
            <div class="summary-row">
                <span class="label">Booking ID:</span>
                <span class="value" id="resID">-</span>
            </div>
            <div class="summary-row">
                <span class="label">Package:</span>
                <span class="value" id="resPackage">-</span>
            </div>
            <div class="summary-row">
                <span class="label">Travel Date:</span>
                <span class="value" id="resDate">-</span>
            </div>
            <div class="summary-row">
                <span class="label">Payment Status:</span>
                <span class="badge">PAID</span>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <a href="/receipt.html" class="btn-receipt">
                <i class="fas fa-file-invoice"></i> Download Payment Receipt
            </a>
            <a href="/" class="btn-home">Great! Return to Home</a>
        </div>
    </div>

    <!-- Extra styles for receipt button -->
    <style>
        .btn-receipt {
            background: white;
            color: var(--dark);
            padding: 14px 40px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid #e1e4e8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-receipt:hover {
            background: #f8fafc;
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>

    <script>
        const booking = JSON.parse(sessionStorage.getItem('confirmedBooking'));
        if(booking) {
            document.getElementById('resID').textContent = booking.bookingId || 'TGO-48293';
            document.getElementById('resPackage').textContent = booking.travelSpot;
            document.getElementById('resDate').textContent = new Date(booking.travelDate).toLocaleDateString('en-US', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
